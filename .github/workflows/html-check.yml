name: HTML Basic Workflow

on:
  push:
    branches:
      - main
    paths:
      - 'index.html'

jobs:
  html-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show index.html content
        run: cat index.html

      - name: Print success message
        run: echo "index.html changed, so workflow ran"
